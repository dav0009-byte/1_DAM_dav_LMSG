<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

    <p>Hola Mundo</p>
    
    <script>

        var numero1 = prompt("Ingrese el primer número"); // Solicitar al usuario que ingrese el primer número y almacenarlo en la variable "numero1"

        var numero2 = prompt("Ingrese el segundo número"); // Solicitar al usuario que ingrese el segundo número y almacenarlo en la variable "numero2"

        var resultado = parseInt(numero1) + parseInt(numero2); // Convertir las cadenas ingresadas a números de punto flotante y sumarlos, almacenando el resultado en la variable "resultado"

        document.write("<p>El resultado de la suma es: " + resultado + "</p>"); // Concatenación de cadenas para mostrar el resultado de la suma

    </script>
</body>
</html>
