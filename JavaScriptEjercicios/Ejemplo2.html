<!DOCTYPE html>
<html lang="en">
<head>

<body>

    <p>Hola Mundo</p>

    <script>

        var ciudad = prompt("Ingrese el nombre de una ciudad"); //  Solicitar al usuario que ingrese el nombre de una ciudad y almacenarlo en la variable "ciudad"

    </script>
