<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Letra DNI</title>
</head>
<body>

    <script type ="text/javascript">

        var letras = ['T', 'R', 'W', 'A', 'G', 'M', 'Y', 'F', 'P', 'D', 'X', 'B', 'N', 'J', 'Z', 'S', 'Q', 'V', 'H', 'L', 'C', 'K', 'E'];


        var numeroDNI = prompt("Introduce tu número de DNI (sin letra):");

        if (numeroDNI >= 0 && numeroDNI <= 99999999) {
            var letraDNI = letras[numeroDNI % 23];
            alert("Tu letra de DNI es: " + letraDNI);
        } else {
            alert("Número de DNI no válido. Debe estar entre 0 y 99999999.");
        }
    </script>
    
</body>
</html>
