<body>

    <script>

        var array = [];

        for(i=1;i<=6;i++){
            
            var numero = Math.floor(Math.random()*49)+1;
            array.push(numero);

            if(array.includes(numero)){
                array.push(numero);

            }
        }
       
        document.write(array);


    </script>
