<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ej18</title>
</head>
<body>
    
    <script>

        var frase = prompt("Escribe una frase ");

        var palabrasSeparadas = frase.split(" ");

        document.write("Las palabras de la frase son: " + palabrasSeparadas.length + "<br>");

        for (i=0;i<palabrasSeparadas.length;i++){
            document.write((i+1) + ". " + palabrasSeparadas[i] + "<br>");
        }
 
    </script>

</body>
</html>
