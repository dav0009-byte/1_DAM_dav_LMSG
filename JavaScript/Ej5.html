<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 5 </title>
</head>
<body>
    <script>

        /*Calcula el IVA de un precio que se pasa por parámetro en una función, mostrar el resultado en un alert */

        function calcularIVA(precio) {
            var iva = precio * 0.21; // Calcula el IVA (21% en este caso)
            alert("El IVA de " + precio + " es: " + iva);
        }

        var precioProducto = 100; // Precio del producto

        calcularIVA(precioProducto); // Llama a la función para calcular el IVA

    </script>    
</body>
</html>
